<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 游戏广告创意工作流 — 6大核心案例交互大屏</title>
  
  <!-- 引入 Google Fonts (Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  
  <!-- 引入 GSAP 核心动画库 -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>

  <style>
    /* ── 设计系统与基础变量 ───────────────────────────────── */
    :root {
      --bg: #09090b;
      --panel-bg: rgba(18, 18, 28, 0.7);
      --panel-border: rgba(255, 255, 255, 0.08);
      --panel-hover-border: rgba(255, 255, 255, 0.16);
      
      --text-primary: #ffffff;
      --text-secondary: #a1a1aa;
      --text-dim: #71717a;
      
      --accent-gemini: #4285F4;
      --accent-dreamina: #FF2E93;
      --accent-openai: #10a37f;
      --accent-gpt: #10a37f;
      --accent-chatgpt-image: #10a37f;
      --accent-claude: #d97706;
      --accent-hyper: #34d399;
      --accent-capcut: #00F2FE;
      --accent-notebooklm: #34A853;
      --accent-ugcpgc: #00f2fe;
      --accent-general: #00f2fe;
      
      --font-stack: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans CJK SC", sans-serif;
    }

    /* ── 基础复位 ────────────────────────────────────────── */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100%;
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-stack);
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    /* ── 背景网格与霓虹微光 ───────────────────────────────── */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: -2;
      background-image: 
        radial-gradient(circle at 30% 20%, rgba(66, 133, 244, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(255, 46, 147, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, #18181b 0%, #09090b 100%);
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image: radial-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.8;
    }

    /* ── 页面外容器 ──────────────────────────────────────── */
    .dashboard-container {
      max-width: 1720px;
      margin: 0 auto;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      min-height: 900px;
    }

    /* ── 头部控制栏 ──────────────────────────────────────── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--panel-border);
      padding-bottom: 20px;
    }

    .logo-area {
      display: flex;
      flex-direction: column;
    }

    .logo-area h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff 30%, #a1a1aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-area .tagline {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 4px;
      letter-spacing: 0.5px;
      font-weight: 400;
    }

    /* 分类菜单 */
    .category-tabs {
      display: flex;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--panel-border);
      padding: 4px;
      border-radius: 99px;
      gap: 4px;
      backdrop-filter: blur(12px);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05);
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      padding: 8px 18px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      border: 1px solid transparent;
    }

    .tab-btn:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.03);
    }

    /* 三大品类激活状态的独特霓虹微光视觉表现 */
    .tab-btn[data-category="creative"].active {
      background: linear-gradient(135deg, rgba(66, 133, 244, 0.12) 0%, rgba(255, 46, 147, 0.12) 100%);
      border: 1px solid rgba(66, 133, 244, 0.3);
      color: #fff;
      box-shadow: 0 0 15px rgba(66, 133, 244, 0.25), 0 0 5px rgba(255, 46, 147, 0.15);
    }

    .tab-btn[data-category="efficiency"].active {
      background: linear-gradient(135deg, rgba(52, 211, 153, 0.12) 0%, rgba(16, 163, 127, 0.12) 100%);
      border: 1px solid rgba(52, 211, 153, 0.3);
      color: #fff;
      box-shadow: 0 0 15px rgba(52, 211, 153, 0.25), 0 0 5px rgba(16, 163, 127, 0.15);
    }

    .tab-btn[data-category="knowledge"].active {
      background: linear-gradient(135deg, rgba(230, 126, 34, 0.12) 0%, rgba(217, 119, 6, 0.12) 100%);
      border: 1px solid rgba(230, 126, 34, 0.3);
      color: #fff;
      box-shadow: 0 0 15px rgba(230, 126, 34, 0.25), 0 0 5px rgba(217, 119, 6, 0.15);
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* 按钮样式 */
    .btn {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      color: var(--text-primary);
      padding: 10px 18px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      backdrop-filter: blur(10px);
    }

    .btn:hover {
      border-color: var(--panel-hover-border);
      background: rgba(255, 255, 255, 0.05);
      transform: translateY(-1px);
    }

    .btn.active {
      background: linear-gradient(135deg, var(--accent-gemini) 0%, var(--accent-dreamina) 100%);
      border-color: transparent;
      box-shadow: 0 4px 20px rgba(66, 133, 244, 0.3);
    }

    /* 播放控制与倒计时 */
    .play-status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--panel-border);
      padding: 6px 12px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: var(--text-dim);
      transition: background-color 0.3s ease;
    }

    .status-dot.active {
      background-color: #34d399;
      box-shadow: 0 0 8px #34d399;
      animation: pulse 1.5s infinite alternate;
    }

    @keyframes pulse {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    /* ── 主工作区网格 ────────────────────────────────────── */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 320px 1fr 380px;
      gap: 24px;
      flex: 1;
      min-height: 0; /* 允许网格高度自适应收缩 */
    }

    /* ── 左侧：案例导航 ────────────────────────────────────── */
    .nav-column {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      padding-right: 4px;
    }

    /* 隐藏滚动条 */
    .nav-column::-webkit-scrollbar {
      width: 4px;
    }
    .nav-column::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.05);
      border-radius: 99px;
    }

    .case-card {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .case-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: transparent;
      transition: background 0.3s ease;
    }

    .case-card:hover {
      transform: translateX(4px);
      border-color: var(--panel-hover-border);
      background: rgba(255, 255, 255, 0.03);
    }

    .case-card.active {
      background: rgba(255, 255, 255, 0.02);
      border-color: var(--active-border-color, var(--accent-gemini));
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
    }

    .case-card.active::before {
      background: var(--active-border-color, var(--accent-gemini));
    }

    .case-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .case-index {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-dim);
    }

    .case-icon-wrap {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.7;
    }

    .case-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .case-tagline {
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ── 中央：流程图画布 ─────────────────────────────────── */
    .canvas-column {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(16px);
    }

    .canvas-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--panel-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 5;
    }

    .canvas-title {
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .canvas-title .subtitle {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-secondary);
    }

    /* 流程连接线 SVG 画布 */
    svg.connections-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .connection-path-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.04);
      stroke-width: 2;
    }

    .connection-path-pulse {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 8, 40;
      stroke-dashoffset: 0;
      animation: pulse-dash 3s linear infinite;
    }

    @keyframes pulse-dash {
      to {
        stroke-dashoffset: -96;
      }
    }

    /* 流程节点容器 */
    .flowchart-container {
      flex: 1;
      position: relative;
      padding: 30px 20px 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 20px;
      min-height: 600px;
      z-index: 2;
    }

    /* 流程节点卡片 */
    .node-card {
      width: 340px;
      background: rgba(10, 10, 15, 0.85);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 12px 20px;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      text-align: left;
      position: relative;
      z-index: 3;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(8px);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .node-card:hover {
      border-color: var(--node-hover-color, var(--text-dim));
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
    }

    .node-icon {
      font-size: 22px;
      margin-bottom: 0;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--panel-border);
    }

    .node-text-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex-grow: 1;
    }

    .node-label {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .node-sub {
      font-size: 10.5px;
      color: var(--text-dim);
      line-height: 1.3;
    }

    .brand-tag {
      position: absolute;
      top: -10px;
      right: 12px;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #000;
    }

    /* ── 右侧：深度分析解析 ────────────────────────────────── */
    .details-column {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
      backdrop-filter: blur(16px);
    }

    .details-column::-webkit-scrollbar {
      width: 4px;
    }
    .details-column::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.05);
      border-radius: 99px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .desc-box {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .pain-point-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 12.5px;
      line-height: 1.5;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    .pain-point-item::before {
      content: "✕";
      color: #ff4d4f;
      font-weight: 700;
      font-size: 11px;
      margin-top: 2px;
    }

    .efficiency-card {
      background: rgba(52, 211, 153, 0.04);
      border: 1px dashed rgba(52, 211, 153, 0.2);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .efficiency-icon {
      font-size: 24px;
      color: var(--accent-hyper);
    }

    .efficiency-text h4 {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent-hyper);
      margin-bottom: 2px;
    }

    .efficiency-text p {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .tools-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tool-badge {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--panel-border);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── SVG 官方图标定义样式 ───────────────────────────────── */
    .icon-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── 全屏装饰与扫尾 ────────────────────────────────────── */
    footer {
      margin-top: auto;
      padding-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--panel-border);
    }

    .footer-credits {
      font-size: 11px;
      color: var(--text-dim);
    }

    .footer-action {
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* 倒计时进度条 */
    .progress-circle-wrap {
      position: relative;
      width: 24px;
      height: 24px;
    }

    .progress-circle-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.08);
      stroke-width: 3;
    }

    .progress-circle-bar {
      fill: none;
      stroke: var(--accent-general);
      stroke-width: 3;
      stroke-dasharray: 63; /* 2 * PI * r (r=10) */
      stroke-dashoffset: 63;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
      transition: stroke-dashoffset 0.1s linear;
    }

    /* ── 弹窗版式覆盖样式 ────────────────────────────────────── */
    body {
      background-color: transparent !important;
    }
    .bg-canvas {
      background: rgba(9, 9, 11, 0.8) !important;
      backdrop-filter: blur(12px);
    }
    .bg-grid {
      opacity: 0.4;
    }
    .dashboard-container {
      max-width: 1360px;
      margin: 0 auto;
      padding: 32px 24px !important;
      display: flex;
      flex-direction: column;
      height: 100vh;
      min-height: auto !important;
      justify-content: center;
    }
    header {
      display: none !important;
    }
    .logo-area, .header-controls, .category-tabs {
      display: none !important;
    }
    .dashboard-grid {
      grid-template-columns: 280px minmax(480px, 1fr) 320px !important;
      gap: 16px !important;
      flex: 1;
      max-height: 78vh;
      min-height: 560px;
    }
    footer {
      display: none !important;
    }
    .nav-column {
      display: flex !important;
      padding-right: 2px !important;
    }
    .case-card {
      border-radius: 14px !important;
      padding: 14px 18px !important;
      gap: 7px !important;
      flex: 0 0 auto !important;
    }
    .case-title {
      font-size: 14px !important;
    }
    .case-tagline {
      font-size: 10.5px !important;
      line-height: 1.4 !important;
    }
    .canvas-column {
      background: rgba(18, 18, 20, 0.85) !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      border-radius: 22px !important;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), 0 0 100px rgba(16, 185, 129, 0.02) !important;
      padding: 18px !important;
      position: relative !important;
      backdrop-filter: blur(30px) !important;
      height: auto !important;
      min-height: 560px !important;
      animation: modal-entrance 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .canvas-header {
      padding: 6px 8px 16px 8px !important;
    }
    .canvas-title {
      padding-right: 42px;
    }
    .canvas-title .subtitle {
      display: block;
      margin-top: 4px;
      margin-left: 0;
    }
    .flowchart-container {
      min-height: 0 !important;
      padding: 24px 12px 28px 12px !important;
      gap: 18px !important;
    }
    .node-card {
      width: min(320px, 100%) !important;
    }
    .details-column {
      display: flex !important;
      border-radius: 22px !important;
      padding: 22px !important;
      gap: 18px !important;
      min-height: 560px;
    }
    .close-modal-btn {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #a1a1aa;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      z-index: 100;
    }
    .close-modal-btn:hover {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
      color: #f87171;
      transform: rotate(90deg);
    }
    @keyframes modal-entrance {
      from {
        opacity: 0;
        transform: scale(0.96) translateY(15px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
    @media (max-width: 1180px) {
      .dashboard-container {
        padding: 24px 18px !important;
      }
      .dashboard-grid {
        grid-template-columns: 240px minmax(420px, 1fr) 280px !important;
        gap: 12px !important;
      }
      .details-column {
        padding: 18px !important;
      }
    }
    @media (max-width: 920px) {
      .dashboard-container {
        height: auto !important;
        min-height: 100vh !important;
        justify-content: flex-start !important;
        padding: 16px 12px !important;
        overflow-y: auto !important;
      }
      .dashboard-grid {
        grid-template-columns: 1fr !important;
        max-height: none !important;
        gap: 16px !important;
      }
      .nav-column,
      .canvas-column,
      .details-column {
        min-height: auto !important;
      }
      
      /* 导航卡片列降维为横向滚动条 */
      .nav-column {
        flex-direction: row !important;
        overflow-x: auto !important;
        overflow-y: hidden !important;
        white-space: nowrap !important;
        padding: 4px 2px 12px 2px !important;
        gap: 10px !important;
        width: 100% !important;
        scrollbar-width: none; /* Firefox */
      }
      .nav-column::-webkit-scrollbar {
        display: none; /* Safari and Chrome */
      }
      
      /* 横向案例卡片微调 */
      .case-card {
        flex: 0 0 160px !important;
        width: 160px !important;
        height: 72px !important;
        padding: 10px 12px !important;
        border-radius: 12px !important;
        gap: 4px !important;
        display: inline-flex !important;
        flex-direction: column !important;

      },
      {

        category: "knowledge",

        painPoints: [
          "游戏版本数值配置极其庞杂，人工跨表校验繁重枯燥且极易出错",
          "版本策划规则口头或文档分散，开发与QA很难实时掌握最新的冲突机制",
          "一处配置错误可能导致严重线上事故，缺乏前置的安全规则扫描引擎"
        ],
        efficiency: "数值核对：人工跨表比对 2~3 天 ⚡ AI 自动化：后台秒级查错与跨部门实时智能检索",
        tools: ["数值配置提取脚本", "冲突语法智能扫描器", "策划规则问答机器人"],
        nodes: [
          { id: "c12-n1", icon: "📄", label: "数值表格与策划案", sub: "多源、庞杂的设计文档及Excel配置" },
          { id: "c12-n2", icon: "🔍", label: "规则冲突与边界校验", sub: "智能扫描语法逻辑及异常配置边界", brand: "hyper" },
          { id: "c12-n3", icon: "📚", label: "策划逻辑规则知识库", sub: "实时维护最新冲突约束向量库", brand: "notebooklm" },
          { id: "c12-n4", icon: "👥", label: "协同问答与自动差分", sub: "QA及研发多端实时问答校验", brand: "claude" }
        ],
        connections: [
          { from: "c12-n1", to: "c12-n2" },
          { from: "c12-n2", to: "c12-n3" },
          { from: "c12-n3", to: "c12-n4" }
        ]
      }
    ];

    // 状态全局变量
    let currentCategory = 'creative';
    let currentCaseIndex = 0;
    let isAutoPlaying = false;
    let playInterval = null;
    const SLIDE_DURATION = 8000; // 每张幻灯片切换的时长 (8秒)
    let animationStartTime = 0;
    let animationTimerFrame = null;

    // 核心 DOM 查询
    const navColumn = document.getElementById('nav-column');
    const canvasTitle = document.getElementById('canvas-title');
    const flowchartContainer = document.getElementById('flowchart-container');
    const svgLayer = document.getElementById('connections-svg');
    const detailsColumn = document.getElementById('details-column');
    const playPauseBtn = document.getElementById('play-pause-btn');
    const btnIcon = document.getElementById('btn-icon');
    const btnText = document.getElementById('btn-text');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const timerCircleWrap = document.getElementById('timer-circle-wrap');
    const timerBar = document.getElementById('timer-bar');

    // 过滤得到当前分类下的案例
    const getFilteredCases = () => {
      return casesData.filter(c => c.category === currentCategory);
    };

    // ── 初始化生成左侧卡片导航 ─────────────────────────────
    const initNavigation = () => {
      navColumn.innerHTML = '';
      const filtered = getFilteredCases();
      filtered.forEach((c, idx) => {
        const card = document.createElement('div');
        card.className = `case-card ${idx === 0 ? 'active' : ''}`;
        card.style.setProperty('--active-border-color', c.accent);
        card.setAttribute('data-index', idx);
        
        // 渲染简短的卡片内容
        card.innerHTML = `
          <div class="case-meta">
            <span class="case-index">CASE ${c.id < 10 ? '0' + c.id : c.id}</span>
            <div class="case-icon-wrap" style="color: ${c.accent};">
              ${c.navBrand ? getBrandIconMarkup(c.navBrand) : (c.nodes[1] && c.nodes[1].brand ? getBrandIconMarkup(c.nodes[1].brand) : '🤖')}
            </div>
          </div>
          <div class="case-title">${c.title}</div>
          <div class="case-tagline">${c.subtitle}</div>
        `;
        
        // 点击切换
        card.addEventListener('click', () => {
          if (isAutoPlaying) {
            pauseAutoPlay();
          }
          switchCase(idx);
        });
        
        navColumn.appendChild(card);
      });
    };

    // 品牌小图标获取
    const getBrandIconMarkup = (brand) => {
      const el = document.getElementById(`svg-${brand}`);
      return el ? el.innerHTML : '🤖';
    };

    // ── 核心切换逻辑 ──────────────────────────────────────
    const switchCase = (index) => {
      currentCaseIndex = index;
      const filtered = getFilteredCases();
      const c = filtered[index];
      if (!c) return;
      
      // 更新导航项状态
      const cards = document.querySelectorAll('.case-card');
      cards.forEach((card, idx) => {
        if (idx === index) {
          card.classList.add('active');
        } else {
          card.classList.remove('active');
        }
      });

      // 1. 渲染头部标题
      canvasTitle.innerHTML = `
        <span style="color: ${c.accent}; text-shadow: 0 0 10px ${c.accent}40;">${c.id < 10 ? '0' + c.id : c.id}</span>
        ${c.title}
        <span class="subtitle">${c.subtitle}</span>
      `;
      
      // 2. 渲染流程节点 (HTML Cards)
      const existingCards = flowchartContainer.querySelectorAll('.node-card');
      existingCards.forEach(card => card.remove());
      svgLayer.innerHTML = ''; // 清空连线

      c.nodes.forEach((node, nodeIdx) => {
        const nodeDiv = document.createElement('div');
        nodeDiv.className = 'node-card';
        nodeDiv.id = node.id;
        nodeDiv.style.setProperty('--node-hover-color', c.accent);
        
        let iconMarkup = node.icon;
        if (node.brand) {
          iconMarkup = getBrandIconMarkup(node.brand);
        }
        
        let brandTagMarkup = '';
        if (node.brand) {
          let brandName = '';
          if (node.brand === 'gemini') brandName = 'Gemini';
          else if (node.brand === 'dreamina') brandName = '即梦 AI';
          else if (node.brand === 'chatgpt-image') brandName = 'ChatGPT';
          else if (node.brand === 'gpt') brandName = 'GPT-4o';
          else if (node.brand === 'claude') brandName = 'Claude';
          else if (node.brand === 'hyper') brandName = 'Hyper Farm';
          else if (node.brand === 'capcut') brandName = '剪映 CapCut';
          else if (node.brand === 'notebooklm') brandName = 'NotebookLM';
          else if (node.brand === 'ugcpgc') brandName = 'UGC/PGC';
          brandTagMarkup = `<span class="brand-tag" style="background-color: var(--accent-${node.brand});">${brandName}</span>`;
        }

        nodeDiv.innerHTML = `
          ${brandTagMarkup}
          <div class="node-icon">${iconMarkup}</div>
          <div class="node-text-wrap">
            <div class="node-label">${node.label}</div>
            <div class="node-sub">${node.sub}</div>
          </div>
        `;
        
        flowchartContainer.appendChild(nodeDiv);
      });

      // 3. 渲染右侧详细分析
      detailsColumn.innerHTML = `
        <div>
          <div class="section-title">💡 管线大纲</div>
          <div class="desc-box">${c.desc}</div>
        </div>
        
        <div>
          <div class="section-title">✕ 核心痛点</div>
          <div>
            ${c.painPoints.map(p => `<div class="pain-point-item">${p}</div>`).join('')}
          </div>
        </div>
        
        <div>
          <div class="section-title">⚡ 提效转化数据</div>
          <div class="efficiency-card">
            <span class="efficiency-icon">🚀</span>
            <div class="efficiency-text">
              <h4>${c.efficiency}</h4>
              <p>利用智能体决策和图像视频模型进行几何级别的无缝合成与秒级渲染</p>
            </div>
          </div>
        </div>
        
        <div>
          <div class="section-title">🛠️ 核心工具链</div>
          <div class="tools-wrap">
            ${c.tools.map(t => `<span class="tool-badge">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style="display:inline-block; margin-right:4px;">
                <circle cx="5" cy="5" r="4" stroke="${c.accent}" stroke-width="1.5"/>
              </svg>
              ${t}
            </span>`).join('')}
          </div>
        </div>
      `;

      // 4. 重绘连接连线
      setTimeout(() => {
        drawConnections(c);
        
        // 5. GSAP 核心入场动画效果
        gsap.killTweensOf('.node-card');
        gsap.killTweensOf('.connection-path-pulse');
        gsap.killTweensOf('.details-column > *');
        
        // 节点依次以 Spring 动画滑入
        gsap.fromTo('.node-card', 
          { scale: 0.6, y: 40, opacity: 0 },
          { 
            scale: 1, 
            y: 0, 
            opacity: 1, 
            duration: 0.7, 
            stagger: 0.08, 
            ease: "back.out(1.4)",
            onUpdate: () => {
              // 在动画执行期间实时重绘连接线，确保连线随着卡片滑入动态伸展
              drawConnections(c);
            },
            onComplete: () => {
              // 动画完成后最后精确重绘一次
              drawConnections(c);
              // 触发霓虹连线发光效果
              gsap.fromTo('.connection-path-pulse', 
                { opacity: 0 }, 
                { opacity: 1, duration: 0.5 }
              );
            }
          }
        );

        // 右侧详情淡入
        gsap.fromTo('.details-column > *',
          { x: 30, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.6, stagger: 0.1, ease: "power2.out" }
        );
      }, 50);
    };

    // ── SVG 连线计算与绘制 ──────────────────────────────────
    const drawConnections = (c) => {
      svgLayer.innerHTML = '';
      const containerRect = flowchartContainer.getBoundingClientRect();

      c.connections.forEach(conn => {
        const fromEl = document.getElementById(conn.from);
        const toEl = document.getElementById(conn.to);
        
        if (!fromEl || !toEl) return;

        const fromRect = fromEl.getBoundingClientRect();
        const toRect = toEl.getBoundingClientRect();

        // 计算相对坐标 (从上方卡片的底端中心，连线到下方卡片的顶端中心)
        const x1 = fromRect.left + fromRect.width / 2 - containerRect.left;
        const y1 = fromRect.bottom - containerRect.top;
        const x2 = toRect.left + toRect.width / 2 - containerRect.left;
        const y2 = toRect.top - containerRect.top;

        // 绘制垂直贝塞尔曲线，使线条流动感极佳且完美对齐
        const dy = y2 - y1;
        const pathD = `M ${x1} ${y1} C ${x1} ${y1 + dy * 0.4}, ${x2} ${y2 - dy * 0.4}, ${x2} ${y2}`;

        // 1. 背景淡淡的荧光路径
        const bgPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        bgPath.setAttribute('d', pathD);
        bgPath.setAttribute('class', 'connection-path-bg');
        svgLayer.appendChild(bgPath);

        // 2. 高亮霓虹数据流光路径
        const pulsePath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        pulsePath.setAttribute('d', pathD);
        pulsePath.setAttribute('class', 'connection-path-pulse');
        pulsePath.style.stroke = c.accent;
        pulsePath.style.shadowBlur = '8px';
        pulsePath.style.filter = `drop-shadow(0px 0px 4px ${c.accent})`;
        svgLayer.appendChild(pulsePath);
      });
    };

    // ── 自动演示 Presentation 引擎 ──────────────────────────
    const startAutoPlay = () => {
      isAutoPlaying = true;
      playPauseBtn.classList.add('active');
      btnIcon.innerHTML = '⏸';
      btnText.innerHTML = '暂停放映模式';
      
      statusDot.classList.add('active');
      statusText.innerHTML = '自动放映演示中';
      timerCircleWrap.style.display = 'block';

      animationStartTime = Date.now();
      updateTimerCircle();

      playInterval = setInterval(() => {
        const filtered = getFilteredCases();
        let nextIndex = (currentCaseIndex + 1) % filtered.length;
        switchCase(nextIndex);
        animationStartTime = Date.now();
      }, SLIDE_DURATION);
    };

    const pauseAutoPlay = () => {
      isAutoPlaying = false;
      playPauseBtn.classList.remove('active');
      btnIcon.innerHTML = '▶';
      btnText.innerHTML = '自动放映模式';
      
      statusDot.classList.remove('active');
      statusText.innerHTML = '交互探索模式';
      timerCircleWrap.style.display = 'none';

      if (playInterval) clearInterval(playInterval);
      if (animationTimerFrame) cancelAnimationFrame(animationTimerFrame);
    };

    const updateTimerCircle = () => {
      if (!isAutoPlaying) return;

      const elapsed = Date.now() - animationStartTime;
      const progress = Math.min(elapsed / SLIDE_DURATION, 1);
      
      // 倒计时环形计算: stroke-dashoffset = 63 * (1 - progress)
      const offset = 63 * (1 - progress);
      timerBar.style.strokeDashoffset = offset;

      animationTimerFrame = requestAnimationFrame(updateTimerCircle);
    };

    // 监听窗口尺寸变化，保证 SVG 连线随排版精准自适应
    window.addEventListener('resize', () => {
      const filtered = getFilteredCases();
      if (filtered[currentCaseIndex]) {
        drawConnections(filtered[currentCaseIndex]);
      }
    });

    // ── 菜单分类切换事件绑定 ────────────────────────────────────
    const tabButtons = document.querySelectorAll('.category-tabs .tab-btn');
    tabButtons.forEach(btn => {
      btn.addEventListener('click', (e) => {
        const targetBtn = e.currentTarget;
        const category = targetBtn.getAttribute('data-category');
        if (currentCategory === category) return;
        
        tabButtons.forEach(b => b.classList.remove('active'));
        targetBtn.classList.add('active');
        
        currentCategory = category;
        
        if (isAutoPlaying) {
          pauseAutoPlay();
        }
        
        initNavigation();
        switchCase(0);
      });
    });

    // ── 播放按钮交互绑定 ────────────────────────────────────
    playPauseBtn.addEventListener('click', () => {
      if (isAutoPlaying) {
        pauseAutoPlay();
      } else {
        startAutoPlay();
      }
    });

    // ── 初始化 ───────────────────────────────────────────
    const urlParams = new URLSearchParams(window.location.search);
    const categoryParam = urlParams.get('category') || window.location.hash.replace('#', '');
    const validCategories = ['creative', 'efficiency', 'knowledge'];
    if (validCategories.includes(categoryParam)) {
      currentCategory = categoryParam;
      // 更新 Tab 按钮的 active 状态
      tabButtons.forEach(b => {
        if (b.getAttribute('data-category') === categoryParam) {
          b.classList.add('active');
        } else {
          b.classList.remove('active');
        }
      });
    }

    // ── 关闭弹窗事件绑定 ────────────────────────────────────
    document.getElementById('close-modal-btn')?.addEventListener('click', () => {
      window.parent.postMessage({ type: 'close-workflow' }, '*');
    });

    initNavigation();
    switchCase(0);
  </script>
