    <circle cx="110" cy="112" r="58" fill="#dbeafe" stroke="#d7e4f6"/>
    <circle cx="110" cy="98" r="19" fill="#202332" opacity=".86"/>
    <path d="M72 150 C88 124, 132 124, 148 150" fill="#202332" opacity=".86"/>
    <text x="206" y="84" class="faint label">Resume / Creative Growth</text>
    <text x="206" y="150" class="text h1">王晨阳</text>
    <text x="206" y="196" class="muted body">资深广告创意设计师 / AI 工作流负责人</text>
    <text x="206" y="236" class="muted small">北京 · 459361040@qq.com · 9 年广告设计与买量创意经验</text>
    <rect x="872" y="78" width="190" height="56" rx="28" fill="#202332"/>
    <text x="915" y="114" fill="#fff" font-size="18" font-weight="760" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">下载 PDF</text>
  </g>

  <g transform="translate(142 526)">
    <rect class="card" x="0" y="0" width="356" height="322" rx="30"/>
    <text x="26" y="48" class="text h2">技能矩阵</text>
    <g transform="translate(26 86)">
      <text x="0" y="0" class="muted small">创意策划</text><rect x="0" y="18" width="304" height="8" rx="4" fill="#edf2f7"/><rect x="0" y="18" width="282" height="8" rx="4" fill="#3b82f6"/>
      <text x="0" y="64" class="muted small">AI 生图/视频</text><rect x="0" y="82" width="304" height="8" rx="4" fill="#edf2f7"/><rect x="0" y="82" width="292" height="8" rx="4" fill="#3b82f6"/>
      <text x="0" y="128" class="muted small">投放数据分析</text><rect x="0" y="146" width="304" height="8" rx="4" fill="#edf2f7"/><rect x="0" y="146" width="262" height="8" rx="4" fill="#3b82f6"/>
      <text x="0" y="192" class="muted small">合成剪辑</text><rect x="0" y="210" width="304" height="8" rx="4" fill="#edf2f7"/><rect x="0" y="210" width="274" height="8" rx="4" fill="#3b82f6"/>
    </g>
  </g>

  <g transform="translate(542 526)">
    <rect class="card" x="0" y="0" width="756" height="322" rx="30"/>
