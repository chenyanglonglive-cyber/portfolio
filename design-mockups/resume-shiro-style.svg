<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1500" viewBox="0 0 1440 1500" role="img" aria-label="简历 Shiro inspired visual mockup">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaf7"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#64748b" flood-opacity="0.10"/>
    </filter>
    <style>
      .text { fill: #202332; font-family: Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .muted { fill: #717786; font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .faint { fill: #9aa3b2; font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .accent { fill: #3b82f6; }
      .nav { font-size: 17px; font-weight: 650; }
      .h1 { font-size: 56px; font-weight: 760; }
      .h2 { font-size: 30px; font-weight: 740; }
      .h3 { font-size: 22px; font-weight: 740; }
      .body { font-size: 21px; }
      .small { font-size: 17px; }
      .label { font-size: 15px; font-weight: 760; }
      .card { fill: rgba(255,255,255,.78); stroke: #e6e9ef; filter: url(#shadow); }
      .line { stroke: #e6e9ef; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1440" height="1500" fill="url(#bg)"/>
  <circle cx="1184" cy="280" r="260" fill="#dbeafe" opacity=".25"/>
  <circle cx="260" cy="1180" r="300" fill="#f5f3ff" opacity=".35"/>

  <rect x="104" y="34" width="1232" height="74" rx="37" fill="rgba(255,255,255,.72)" stroke="#e8ebf1"/>
  <circle cx="147" cy="71" r="23" fill="#202332"/>
  <text x="181" y="79" class="text nav">王晨阳</text>
  <text x="908" y="78" class="muted nav">首页</text>
  <text x="983" y="78" class="accent nav">简历</text>
  <rect x="977" y="91" width="43" height="3" rx="1.5" fill="#3b82f6"/>
  <text x="1058" y="78" class="muted nav">作品</text>
  <rect x="1184" y="48" width="111" height="46" rx="23" fill="#202332"/>
  <text x="1214" y="78" fill="#fff" font-size="16" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">联系我</text>

  <g transform="translate(142 178)">
