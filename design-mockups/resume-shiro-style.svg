    <text x="78" y="154" class="text h3">《雷霆战机》10 周年品牌焕新买量</text>
    <text x="78" y="188" class="muted small">主导情怀向策略，抖音消耗 510 万+，沉淀多条 10W+ 爆款素材。</text>
    <circle cx="48" cy="236" r="7" fill="#3b82f6"/>
    <text x="78" y="230" class="accent label">2025.01</text>
    <text x="78" y="264" class="text h3">公司级 AI 提效体系搭建</text>
    <text x="78" y="298" class="muted small">设计视频制作全流程 AI 工作流，输出培训文档并推动团队落地。</text>
  </g>

  <g transform="translate(142 1360)">
    <text x="0" y="0" class="faint small">工作经历 · 北京爱乐游 / 买量视频创意 / AI 发展负责人</text>
    <text x="0" y="38" class="faint small">教育经历 · 成都大学 动画 本科</text>
