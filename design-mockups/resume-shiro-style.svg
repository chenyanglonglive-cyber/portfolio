    <text x="30" y="136" class="muted body">擅长将 IP 沉淀、投放数据与现代买量策略结合，创造百万级消耗素材。</text>
    <text x="30" y="176" class="muted body">主导 AI 视频工作流搭建、团队培训和创意生产流程优化。</text>
    <g transform="translate(30 226)">
      <rect x="0" y="0" width="116" height="42" rx="21" fill="#eff6ff" stroke="#d7e8ff"/><text x="27" y="27" class="accent label">爆款素材</text>
      <rect x="132" y="0" width="142" height="42" rx="21" fill="#f8fafc" stroke="#e6e9ef"/><text x="158" y="27" class="muted label">AI 工作流</text>
      <rect x="290" y="0" width="132" height="42" rx="21" fill="#f8fafc" stroke="#e6e9ef"/><text x="316" y="27" class="muted label">数据复盘</text>
    </g>
  </g>

  <g transform="translate(142 918)">
    <rect class="card" x="0" y="0" width="1156" height="396" rx="30"/>
    <text x="30" y="52" class="text h2">核心项目</text>
    <line x1="48" y1="96" x2="48" y2="336" class="line"/>
    <circle cx="48" cy="126" r="7" fill="#3b82f6"/>
