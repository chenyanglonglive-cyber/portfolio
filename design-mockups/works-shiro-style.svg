  </g>

  <g transform="translate(142 812)">
    <g>
      <rect class="card" x="0" y="0" width="560" height="188" rx="28"/>
      <rect x="22" y="22" width="146" height="144" rx="20" fill="#edf2ff"/>
      <text x="198" y="64" class="text h2">奇幻世界观设定</text>
      <text x="198" y="102" class="muted small">从世界观、角色阵营和广告切入点做统一规划。</text>
