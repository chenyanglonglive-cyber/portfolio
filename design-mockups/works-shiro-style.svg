      <rect x="90" y="0" width="108" height="42" rx="21" fill="#fff" stroke="#e6e9ef"/>
      <text x="117" y="27" class="muted label">视频素材</text>
      <rect x="212" y="0" width="108" height="42" rx="21" fill="#fff" stroke="#e6e9ef"/>
      <text x="239" y="27" class="muted label">图片素材</text>
      <rect x="334" y="0" width="108" height="42" rx="21" fill="#fff" stroke="#e6e9ef"/>
