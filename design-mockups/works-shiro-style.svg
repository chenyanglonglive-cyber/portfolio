      <rect x="22" y="22" width="316" height="162" rx="20" fill="#f3f4f6"/>
      <circle cx="100" cy="100" r="42" fill="#dbeafe"/>
      <circle cx="180" cy="100" r="42" fill="#e0e7ff"/>
      <circle cx="260" cy="100" r="42" fill="#f8fafc"/>
