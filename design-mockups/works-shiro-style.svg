<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1180" viewBox="0 0 1440 1180" role="img" aria-label="作品集 Shiro inspired visual mockup">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaf7"/>
      <stop offset="1" stop-color="#f7fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#64748b" flood-opacity="0.10"/>
    </filter>
    <style>
      .text { fill: #202332; font-family: Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .muted { fill: #717786; font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .faint { fill: #9aa3b2; font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .accent { fill: #3b82f6; }
      .nav { font-size: 17px; font-weight: 650; }
      .h1 { font-size: 58px; font-weight: 760; }
      .h2 { font-size: 28px; font-weight: 740; }
      .body { font-size: 22px; }
      .small { font-size: 17px; }
      .label { font-size: 15px; font-weight: 760; }
      .card { fill: rgba(255,255,255,.76); stroke: #e6e9ef; filter: url(#shadow); }
    </style>
  </defs>
  <rect width="1440" height="1180" fill="url(#bg)"/>
  <circle cx="1190" cy="260" r="260" fill="#dbeafe" opacity=".28"/>
  <circle cx="210" cy="920" r="260" fill="#f5f3ff" opacity=".38"/>

  <rect x="104" y="34" width="1232" height="74" rx="37" fill="rgba(255,255,255,.72)" stroke="#e8ebf1"/>
