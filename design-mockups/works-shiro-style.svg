  <text x="983" y="78" class="muted nav">简历</text>
  <text x="1058" y="78" class="accent nav">作品</text>
  <rect x="1051" y="91" width="45" height="3" rx="1.5" fill="#3b82f6"/>
  <rect x="1184" y="48" width="111" height="46" rx="23" fill="#202332"/>
  <text x="1214" y="78" fill="#fff" font-size="16" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">联系我</text>

