<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1100" viewBox="0 0 1440 1100" role="img" aria-label="首页 Shiro inspired visual mockup">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaf7"/>
      <stop offset="0.52" stop-color="#f5f7fb"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="accentWash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dbeafe" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#f5f3ff" stop-opacity="0.75"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#64748b" flood-opacity="0.12"/>
    </filter>
    <filter id="miniShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#64748b" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg { fill: url(#pageBg); }
      .paper { fill: rgba(255,255,255,.78); stroke: #e6e9ef; stroke-width: 1; filter: url(#softShadow); }
      .soft { fill: rgba(255,255,255,.64); stroke: #e7ebf2; stroke-width: 1; }
      .text { fill: #202332; font-family: Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .muted { fill: #717786; font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .faint { fill: #9aa3b2; font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .accent { fill: #3b82f6; }
      .small { font-size: 18px; }
      .body { font-size: 24px; }
      .label { font-size: 16px; font-weight: 700; }
      .h1 { font-size: 66px; font-weight: 760; }
      .h2 { font-size: 34px; font-weight: 720; }
      .nav { font-size: 17px; font-weight: 650; }
      .card-title { font-size: 24px; font-weight: 740; }
    </style>
  </defs>

  <rect class="bg" width="1440" height="1100"/>
  <circle cx="1120" cy="160" r="220" fill="#dbeafe" opacity=".36"/>
  <circle cx="220" cy="870" r="260" fill="#f5f3ff" opacity=".55"/>
  <path d="M160 240 C430 160, 540 320, 810 230 S1190 170, 1320 310" fill="none" stroke="#d8dee9" stroke-width="1.2" opacity=".45"/>

  <rect x="104" y="34" width="1232" height="74" rx="37" fill="rgba(255,255,255,.72)" stroke="#e8ebf1" filter="url(#miniShadow)"/>
  <circle cx="147" cy="71" r="23" fill="#202332"/>
  <text x="181" y="79" class="text nav">王晨阳</text>
  <text x="908" y="78" class="muted nav">首页</text>
  <text x="983" y="78" class="muted nav">简历</text>
  <text x="1058" y="78" class="muted nav">作品</text>
  <rect x="1184" y="48" width="111" height="46" rx="23" fill="#202332"/>
  <text x="1214" y="78" fill="#fff" font-size="16" font-weight="700" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif">联系我</text>

  <g transform="translate(142 188)">
    <rect class="paper" x="0" y="0" width="1156" height="438" rx="34"/>
    <circle cx="100" cy="100" r="54" fill="url(#accentWash)" stroke="#d7e4f6"/>
    <circle cx="100" cy="87" r="18" fill="#202332" opacity=".86"/>
    <path d="M64 136 C76 112, 124 112, 137 136" fill="#202332" opacity=".86"/>
    <text x="184" y="86" class="faint label">Hi, I'm Alessio</text>
    <text x="184" y="157" class="text h1">王晨阳</text>
    <text x="184" y="204" class="text h2">资深广告创意设计师 / AI 工作流负责人</text>
    <text x="184" y="260" class="muted body">把买量创意、数据复盘与 AI 工作流串成一套更高效的增长系统。</text>
    <text x="184" y="302" class="muted body">专注视频素材、图片广告、项目复盘与团队提效。</text>
    <rect x="184" y="342" width="128" height="42" rx="21" fill="#eff6ff" stroke="#d7e8ff"/>
    <text x="211" y="369" class="accent label">9 年经验</text>
    <rect x="328" y="342" width="174" height="42" rx="21" fill="#f8fafc" stroke="#e7ebf2"/>
    <text x="354" y="369" class="muted label">AI Workflow</text>
    <rect x="518" y="342" width="156" height="42" rx="21" fill="#f8fafc" stroke="#e7ebf2"/>
    <text x="546" y="369" class="muted label">高 ROI 素材</text>

    <rect x="820" y="62" width="252" height="292" rx="28" fill="#f8fbff" stroke="#dfe7f3"/>
    <path d="M852 278 C910 210, 944 242, 981 186 C1007 148, 1041 163, 1060 126" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
    <circle cx="858" cy="278" r="7" fill="#3b82f6"/>
    <circle cx="981" cy="186" r="7" fill="#3b82f6"/>
    <circle cx="1060" cy="126" r="7" fill="#3b82f6"/>
    <text x="852" y="101" class="faint label">Current focus</text>
    <text x="852" y="334" class="text small" font-weight="700">Creative systems for growth</text>
  </g>

  <g transform="translate(142 694)">
    <text x="0" y="0" class="text h2">精选作品</text>
    <text x="0" y="42" class="muted small">从投放数据、创意质量和复盘价值中挑选的代表项目。</text>
    <g transform="translate(0 86)">
      <rect class="soft" x="0" y="0" width="356" height="244" rx="26"/>
      <rect x="22" y="22" width="312" height="126" rx="20" fill="#eaf2ff"/>
      <path d="M48 122 C96 62, 138 94, 178 54 C224 8, 272 68, 312 30" fill="none" stroke="#3b82f6" stroke-width="3" opacity=".76"/>
      <text x="24" y="184" class="text card-title">战机仓库轮播</text>
      <text x="24" y="218" class="muted small">视频素材 · 510w+ 消耗</text>
    </g>
    <g transform="translate(400 86)">
      <rect class="soft" x="0" y="0" width="356" height="244" rx="26"/>
      <rect x="22" y="22" width="312" height="126" rx="20" fill="#f3f4f6"/>
      <circle cx="102" cy="86" r="38" fill="#dbeafe"/>
      <circle cx="178" cy="86" r="38" fill="#e0e7ff"/>
      <circle cx="254" cy="86" r="38" fill="#f1f5f9"/>
      <text x="24" y="184" class="text card-title">赛博都市宣传片</text>
      <text x="24" y="218" class="muted small">视频创意 · 复盘完整</text>
    </g>
    <g transform="translate(800 86)">
      <rect class="soft" x="0" y="0" width="356" height="244" rx="26"/>
      <rect x="22" y="22" width="312" height="126" rx="20" fill="#fff7ed"/>
      <path d="M52 126 L132 52 L198 118 L236 82 L310 126 Z" fill="#fed7aa"/>
      <text x="24" y="184" class="text card-title">奇幻世界观设定</text>
      <text x="24" y="218" class="muted small">文章策划 · 创意沉淀</text>
    </g>
  </g>

  <text x="142" y="1046" class="faint small">© 2026 Alessio · Portfolio powered by Next.js, Strapi, R2 and Neon</text>
</svg>
