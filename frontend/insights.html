<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章 - Rico.Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/config.js"></script>
    <link rel="stylesheet" href="css/global.css">
</head>

<body class="antialiased selection:bg-brand selection:text-white pb-24">

    <!-- Main Content Area -->
    <main id="app-content" class="pt-24 max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 min-h-screen">

        <div class="mb-8 p-4 bg-white rounded-2xl shadow-sm text-sm text-textmuted border-l-4 border-brand fade-in">
            <strong class="text-textmain">这里沉淀了深入的行业认知。</strong> 纯图文格式的深度文章列表。
        </div>

        <section class="fade-in max-w-4xl mx-auto">
            <h1 class="text-3xl font-black text-textmain mb-8">行业洞察与文章</h1>

            <div id="articles-container" class="space-y-6 min-h-[300px]">
                <div class="flex flex-col items-center justify-center text-stone-400 py-20">
                    <div class="animate-spin text-4xl mb-4">⏳</div>
                    <p>正在获取最新文章...</p>
                </div>
            </div>
        </section>

    </main>

    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script>
        async function loadArticles() {
            const container = document.getElementById('articles-container');
            const articles = await api.fetchArticles();

            if (articles.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-textmuted">尽情期待更多文章。</div>`;
                return;
            }

            container.innerHTML = articles.map(a => `
                <a href="article-detail.html?id=${a.id}" class="rico-card block p-6 md:p-8 hover:border-brand border border-transparent transition-colors cursor-pointer flex flex-col md:flex-row gap-6">
                    <div class="w-full md:w-1/3 h-40 bg-stone-100 rounded-xl flex items-center justify-center text-3xl shrink-0">
                        📰
                    </div>
                    <div class="flex-1 flex flex-col justify-center">
                        <div class="text-sm text-textmuted mb-2 font-mono">${a.date}</div>
                        <h2 class="text-2xl font-bold text-textmain mb-3 line-clamp-2">${a.title}</h2>
                        <p class="text-stone-600 line-clamp-2">${a.summary}</p>
                        <div class="mt-4 text-brand font-medium">开始阅读 →</div>
                    </div>
                </a>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadArticles();
        });
    </script>
</body>

</html>
