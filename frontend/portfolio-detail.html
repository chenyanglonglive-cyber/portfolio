<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品详情 - Rico.Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/config.js"></script>
    <link rel="stylesheet" href="css/global.css">
</head>

<body class="antialiased selection:bg-brand selection:text-white pb-24">

    <!-- Main Content Area -->
    <main id="app-content" class="pt-24 max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 min-h-screen">
        
        <div class="fade-in">
            <a href="portfolio.html" class="mb-6 flex items-center text-textmuted hover:text-textmain font-medium transition-colors inline-flex">
                <span class="mr-2">←</span> 返回作品集
            </a>

            <div id="detail-container">
                <div class="flex flex-col items-center justify-center text-stone-400 py-32">
                    <div class="animate-spin text-4xl mb-4">⏳</div>
                    <p>正在获取作品详情数据...</p>
                </div>
            </div>
        </div>

    </main>

    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script>
        async function loadDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = parseInt(urlParams.get('id'));
            const container = document.getElementById('detail-container');

            if (!id) {
                container.innerHTML = '<div>未找到作品 ID参数</div>';
                return;
            }

            const works = await api.fetchWorks();
            const work = works.find(w => w.id === id);

            if (!work) {
                container.innerHTML = '<div>作品不存在或已下架</div>';
                return;
            }

            const isVideo = work.type === 'video';
            const hasMedia = isVideo && work.videoUrl && work.videoUrl !== '#';
            
            const playerBg = work.coverUrl
                ? `url('${work.coverUrl}') center/cover`
                : (isVideo ? 'linear-gradient(135deg, #2b5876 0%, #4e4376 100%)' : 'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)');

            container.innerHTML = `
                <div class="flex flex-col lg:flex-row gap-8 items-start fade-in">
                    <!-- Left: Media Player (Sticky) -->
                    <div class="flex-shrink-0 w-full lg:w-[40%] flex justify-center lg:sticky lg:top-28 self-start">
                        <div class="rico-card overflow-hidden bg-black flex items-center justify-center w-fit mx-auto" style="${!hasMedia ? `background: ${playerBg}; aspect-ratio: 16/9; width: 100%;` : ''}">
                            ${hasMedia ? `
                                <video controls class="max-w-full h-auto max-h-[80vh] outline-none block" preload="metadata">
                                    <source src="${work.videoUrl}" type="video/mp4">
                                    您的浏览器不支持视频标签。
                                </video>
                            ` : `
                                <div class="w-full h-full flex items-center justify-center bg-black/40 min-h-[400px]">
                                    <div class="text-center text-white p-6 backdrop-blur-sm bg-black/20 rounded-2xl border border-white/10">
                                        <div class="text-6xl mb-4 drop-shadow-md">${isVideo ? '▶' : '🖼️'}</div>
                                        <h2 class="text-2xl font-bold">${work.title}</h2>
                                    </div>
                                </div>
                            `}
                        </div>
                    </div>

                    <!-- Right: Data Panel & Document -->
                    <div class="flex-1 w-full flex flex-col min-w-[280px]">
                        <!-- Data Panel -->
                        <h3 class="text-xl font-bold mb-4">投放核心数据面板</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-white p-4 rounded-2xl shadow-sm border border-stone-100 flex flex-col justify-center items-center text-center transition-transform hover:scale-105">
                                <span class="text-stone-400 text-sm font-medium mb-1">累计消耗</span>
                                <span class="text-2xl font-black text-red-500">¥${formatMoney(work.spend)}</span>
                            </div>
                            <div class="bg-white p-4 rounded-2xl shadow-sm border border-stone-100 flex flex-col justify-center items-center text-center transition-transform hover:scale-105">
                                <span class="text-stone-400 text-sm font-medium mb-1">7日 ROI</span>
                                <span class="text-2xl font-black text-brand">${work.roi}</span>
                            </div>
                            <div class="bg-white p-4 rounded-2xl shadow-sm border border-stone-100 flex flex-col justify-center items-center text-center transition-transform hover:scale-105">
                                <span class="text-stone-400 text-sm font-medium mb-1">点击率 (CTR)</span>
                                <span class="text-xl font-bold text-textmain">${work.ctr}</span>
                            </div>
                            <div class="bg-white p-4 rounded-2xl shadow-sm border border-stone-100 flex flex-col justify-center items-center text-center transition-transform hover:scale-105">
                                <span class="text-stone-400 text-sm font-medium mb-1">点击付费率</span>
                                <span class="text-xl font-bold text-textmain">${work.cvr}</span>
                            </div>
                        </div>
                        <div class="mt-4 flex flex-wrap gap-2">
                            <span class="px-3 py-1 bg-brand/10 text-brand rounded-full text-sm font-medium">投放时间: ${work.launch_time}</span>
                            <span class="px-3 py-1 bg-brand/10 text-brand rounded-full text-sm font-medium">平台: ${work.platform}</span>
                            <span class="px-3 py-1 bg-brand/10 text-brand rounded-full text-sm font-medium">游戏: ${work.game}</span>
                        </div>

                        <!-- Feishu Document Embedding -->
                        <div class="mt-10 mb-8 fade-in" style="animation-delay: 0.1s;">
                            <h3 class="text-xl font-bold mb-4 flex items-center justify-between">
                                <span class="flex items-center gap-2">📝 创意与优化复盘</span>
                                <a href="https://kcnfrhxvqucv.feishu.cn/wiki/QfjTwbez7irxKmkQWnjchwrYnVb" target="_blank" class="text-sm font-normal text-brand hover:underline flex items-center gap-1">
                                    在新标签页打开 ↗
                                </a>
                            </h3>
                            <div class="rico-card bg-stone-50 p-1 h-[700px] border border-stone-200 overflow-hidden relative">
                                <!-- Loading placeholder -->
                                <div class="absolute inset-0 flex flex-col items-center justify-center text-stone-400 z-0 bg-stone-50">
                                    <div class="animate-spin text-3xl mb-2">⏳</div>
                                    <p class="text-sm">正在加载飞书文档...</p>
                                </div>
                                <!-- Iframe (fallback to user's provided link if work.feishuUrl isn't set) -->
                                <iframe 
                                    src="${work.feishuUrl ? work.feishuUrl : 'https://kcnfrhxvqucv.feishu.cn/wiki/QfjTwbez7irxKmkQWnjchwrYnVb'}" 
                                    class="w-full h-full rounded-xl relative z-10 bg-white" 
                                    frameborder="0" 
                                    allowfullscreen>
                                </iframe>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.title = `${work.title} - 作品详情`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadDetail();
        });
    </script>
</body>

</html>
