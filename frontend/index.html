<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人品牌与作品集 - 首页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/config.js"></script>
    <link rel="stylesheet" href="css/global.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#6366f1',
                        textmain: '#1c1917',
                        textmuted: '#78716c',
                    }
                }
            }
        }
    </script>
</head>

<body class="antialiased selection:bg-black selection:text-white pb-24 bg-white text-black">

    <!-- Main Content Area -->
    <main id="app-content" class="pt-24 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 min-h-screen">

        <!-- Image 2 Style Hero Section -->
        <section class="mb-24 fade-in pt-4 px-4 sm:px-0">
            <!-- The Black Box is the absolute largest container -->
            <div class="relative w-full max-w-7xl mx-auto border-[4px] md:border-[5px] border-black bg-white flex flex-col px-6 py-8 md:px-12 md:py-12 overflow-hidden min-h-[500px] md:min-h-[650px]">
                
                <!-- 1. The Background PORTFOLIO text -->
                <!-- It shares the exact same horizontal boundaries as the rest of the content -->
                <div class="absolute inset-0 z-0 flex items-center justify-center px-6 md:px-12 pointer-events-none">
                    <div class="w-full flex justify-between select-none" style="font-family: 'Times New Roman', Times, serif; transform: scaleY(1.3);">
                        <span class="text-[18vw] md:text-[14vw] leading-none font-black text-black">P</span>
                        <span class="text-[18vw] md:text-[14vw] leading-none font-black text-black">O</span>
                        <span class="text-[18vw] md:text-[14vw] leading-none font-black text-black">R</span>
                        <span class="text-[18vw] md:text-[14vw] leading-none font-black text-black">T</span>
                        <span class="text-[18vw] md:text-[14vw] leading-none font-black text-black">F</span>
                        <span class="text-[18vw] md:text-[14vw] leading-none font-black text-black">O</span>
                        <span class="text-[18vw] md:text-[14vw] leading-none font-black text-black">L</span>
                        <span class="text-[18vw] md:text-[14vw] leading-none font-black text-black">I</span>
                        <span class="text-[18vw] md:text-[14vw] leading-none font-black text-black">O</span>
                    </div>
                </div>

                <!-- 2. The Portrait Image -->
                <!-- Completely inside the black box, above the text, forced to start 30% from the top to ensure margin -->
                <div class="absolute top-[25%] md:top-[30%] bottom-6 md:bottom-8 left-1/2 transform -translate-x-1/2 z-10 pointer-events-none flex justify-center w-full max-w-[600px]">
                    <img src="photo.png" alt="Wang Chenyang" class="w-auto h-full object-contain drop-shadow-xl" style="max-height: 100%;">
                </div>

                <!-- 3. The Left-Aligned Labels & Button (z-20) -->
                <!-- Strict flex-column layout enforcing the shared left-alignment padding -->
                <div class="relative z-20 flex flex-col h-full flex-grow pointer-events-none w-full">
                    <!-- Top section -->
                    <div class="pointer-events-auto">
                        <h2 class="text-3xl md:text-5xl font-black text-black mb-2 tracking-wide" id="profile-name">王晨阳</h2>
                        <h3 class="text-sm md:text-xl font-bold text-stone-700" id="profile-title">资深广告创意设计师 / AI 工作流负责人</h3>
                    </div>

                    <!-- Spacer -->
                    <div class="flex-grow"></div>

                    <!-- Bottom section: Slogan -->
                    <div class="pointer-events-auto w-full md:w-96 mb-6">
                         <p class="text-sm md:text-base font-bold text-stone-800 leading-relaxed bg-white/40 backdrop-blur-md p-2 rounded-lg" id="profile-slogan">9年深耕广告设计，以数据驱动创意，用AI重塑增长，专注百万级消耗高ROI爆款素材。</p>
                    </div>

                    <!-- Bottom section: Tags & Button -->
                    <div class="pointer-events-auto flex items-end justify-between w-full">
                        <div class="flex flex-wrap gap-2 md:gap-3" id="profile-tags">
                            <span class="px-4 py-2 md:px-6 md:py-2.5 rounded-full bg-white/80 backdrop-blur-md text-black text-xs md:text-sm font-bold border-[2px] border-black">爆款专家</span>
                            <span class="px-4 py-2 md:px-6 md:py-2.5 rounded-full bg-white/80 backdrop-blur-md text-black text-xs md:text-sm font-bold border-[2px] border-black">爆款专家</span>
                        </div>
                        
                        <!-- Ensure button strictly aligns right within the box's padding -->
                        <button onclick="openContactModal()" class="bg-white hover:bg-black hover:text-white text-black font-black py-3 px-6 md:py-4 md:px-10 rounded-[1rem] border-[3px] border-black transition-colors shadow-none text-sm md:text-xl shrink-0">
                            下载简历
                        </button>
                    </div>
                </div>

            </div>
        </section>

        <section class="fade-in" style="animation-delay: 0.1s;">
            <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
                <h2 class="text-2xl font-bold text-textmain">作品</h2>

                <div class="flex bg-transparent p-1 rounded-full overflow-x-auto no-scrollbar w-full sm:w-auto gap-2"
                    id="filter-buttons">
                    <button data-filter="recommend" onclick="setFeedFilter('recommend')"
                        class="feed-filter-btn filter-active px-6 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-colors border-2">🚀 Recommend</button>
                    <button data-filter="high-spend" onclick="setFeedFilter('high-spend')"
                        class="feed-filter-btn px-6 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-colors border-2 ml-1">🔥 高消耗</button>
                    <button data-filter="video" onclick="setFeedFilter('video')"
                        class="feed-filter-btn px-6 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-colors border-2 ml-1">▶ 视频素材</button>
                    <button data-filter="image" onclick="setFeedFilter('image')"
                        class="feed-filter-btn px-6 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-colors border-2 ml-1">🖼️ 图片素材</button>
                    <button data-filter="article" onclick="setFeedFilter('article')"
                        class="feed-filter-btn px-6 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-colors border-2 ml-1">📝 文章</button>
                </div>
            </div>

            <!-- 数据在后台无感抓取，初始状态为骨架屏 -->
            <div id="feed-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 min-h-[300px]">
                <!-- 骨架屏卡片 1 -->
                <div class="rico-card animate-pulse overflow-hidden">
                    <div class="w-full h-64 bg-stone-100"></div>
                    <div class="p-6 space-y-3">
                        <div class="h-4 bg-stone-100 rounded w-1/4"></div>
                        <div class="h-6 bg-stone-100 rounded w-3/4"></div>
                        <div class="h-4 bg-stone-100 rounded w-full"></div>
                    </div>
                </div>
                <!-- 骨架屏卡片 2 -->
                <div class="rico-card animate-pulse overflow-hidden">
                    <div class="w-full h-64 bg-stone-100"></div>
                    <div class="p-6 space-y-3">
                        <div class="h-4 bg-stone-100 rounded w-1/4"></div>
                        <div class="h-6 bg-stone-100 rounded w-3/4"></div>
                        <div class="h-4 bg-stone-100 rounded w-full"></div>
                    </div>
                </div>
                <!-- 骨架屏卡片 3 -->
                <div class="rico-card animate-pulse overflow-hidden">
                    <div class="w-full h-64 bg-stone-100"></div>
                    <div class="p-6 space-y-3">
                        <div class="h-4 bg-stone-100 rounded w-1/4"></div>
                        <div class="h-6 bg-stone-100 rounded w-3/4"></div>
                        <div class="h-4 bg-stone-100 rounded w-full"></div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script>
        let currentFilter = 'recommend';

        function syncProfile() {
            const nameEl = document.getElementById('profile-name');
            const titleEl = document.getElementById('profile-title');
            const sloganEl = document.getElementById('profile-slogan');
            const avatarEl = document.getElementById('profile-avatar');
            const tagsEl = document.getElementById('profile-tags');

            if (db.profile.name) {
                if (nameEl) nameEl.innerText = db.profile.name;
                if (titleEl) titleEl.innerText = db.profile.title;
                if (sloganEl) sloganEl.innerText = db.profile.slogan;
                if (tagsEl && db.profile.tags) {
                    tagsEl.innerHTML = db.profile.tags.map(tag => `<span class="px-5 py-2 rounded-full bg-stone-100 text-black text-sm font-bold border border-stone-200">${tag}</span>`).join('');
                }
            }
        }

        // 将逻辑封装进 initPage，供 SPA 路由调用
        window.initPage = async function() {
            // 1. 尝试从缓存渲染个人信息
            const cachedProfile = localStorage.getItem('resume_full_cache');
            if (cachedProfile) {
                try {
                    db.profile = JSON.parse(cachedProfile);
                    syncProfile();
                } catch(e) {}
            }
            syncProfile();
            
            // 2. 【核心优化】双轨制加载：先拿缓存渲染内容，不再等那 5 秒
            const cachedWorks = api.cache.get('works');
            const cachedArticles = api.cache.get('articles');
            if (cachedWorks || cachedArticles) {
                // 如果有缓存，先渲染一波
                let items = [];
                const works = cachedWorks || [];
                const articles = cachedArticles || [];
                if (currentFilter === 'recommend') items = works.sort((a,b)=>b.spend-a.spend).slice(0,3).concat(articles);
                else if (currentFilter === 'article') items = articles;
                else items = works.filter(w => w.type === currentFilter || currentFilter === 'all' || currentFilter === 'recommend');
                
                renderToFeed(items);
            }
            
            // 3. 后台执行真实的 API 同步（会在 5 秒后完成并由 DOM 守卫判定是否更新）
            loadFeed();
        };

        // 抽取渲染逻辑为通用函数
        function renderToFeed(items) {
            const feedContainer = document.getElementById('feed-container');
            if (!feedContainer || !items.length) return;

            let itemsHTML = '';
            items.forEach(item => {
                if (item.spend !== undefined) itemsHTML += generateWorkCard(item);
                else itemsHTML += generateArticleCard(item);
            });

            if (feedContainer.innerHTML.trim() !== itemsHTML.trim()) {
                feedContainer.innerHTML = itemsHTML;
            }
        }

        async function loadFeed() {
            const feedContainer = document.getElementById('feed-container');
            if (!feedContainer) return;

            const items = await api.fetchFeedItems(currentFilter);
            if (items.length > 0) {
                renderToFeed(items);
            } else if (!feedContainer.innerHTML.trim()) {
                feedContainer.innerHTML = `<div class="col-span-full text-center py-10 text-textmuted">没有找到相关数据，请去 Strapi 后台发布几条。</div>`;
            }
        }

        window.setFeedFilter = function (filter) {
            currentFilter = filter;
            document.querySelectorAll('.feed-filter-btn').forEach(btn => {
                btn.classList.remove('filter-active', 'bg-black', 'text-white', 'border-black');
                if (btn.dataset.filter === filter) {
                    btn.classList.add('filter-active', 'bg-black', 'text-white', 'border-black');
                } else {
                    btn.classList.add('bg-white', 'text-textmuted', 'border-stone-200');
                }
            });
            loadFeed();
        }
        
        // Initialize explicit first styling
        setTimeout(() => {
             document.querySelectorAll('.feed-filter-btn').forEach(btn => {
                if (btn.classList.contains('filter-active')) {
                    btn.classList.add('bg-black', 'text-white', 'border-black');
                } else {
                    btn.classList.add('bg-white', 'text-textmuted', 'border-stone-200');
                }
             })
        }, 100);
    </script>
</body>

</html>
