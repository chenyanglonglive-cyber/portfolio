<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人品牌与作品集 - 首页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/config.js"></script>
    <link rel="stylesheet" href="css/global.css">
</head>

<body class="antialiased selection:bg-brand selection:text-white pb-24">

    <!-- Main Content Area -->
    <main id="app-content" class="pt-24 max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 min-h-screen">

        <section class="mb-16 fade-in">
            <div
                class="rico-card p-8 md:p-12 flex flex-col md:flex-row items-center md:items-start gap-8 bg-gradient-to-br from-white to-stone-50">
                <div class="w-32 h-32 md:w-40 md:h-40 rounded-full bg-gradient-to-tr from-brand to-purple-400 flex-shrink-0 flex items-center justify-center text-white text-5xl font-bold shadow-lg"
                    id="profile-avatar">
                </div>
                <div class="flex-1 text-center md:text-left">
                    <h1 class="text-3xl md:text-5xl font-black text-textmain mb-2" id="profile-name"></h1>
                    <h2 class="text-xl md:text-2xl font-medium text-textmuted mb-4" id="profile-title"></h2>
                    <p class="text-base text-textmain mb-6 max-w-2xl leading-relaxed" id="profile-slogan"></p>

                    <div class="flex flex-wrap justify-center md:justify-start gap-2 mb-8" id="profile-tags">
                    </div>

                    <button onclick="openContactModal()"
                        class="bg-brand hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full transition-colors shadow-md flex items-center justify-center gap-2 mx-auto md:mx-0">
                        <span>📩</span> 获取联系方式
                    </button>
                </div>
            </div>
        </section>

        <section class="fade-in" style="animation-delay: 0.1s;">
            <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
                <h2 class="text-2xl font-bold text-textmain">作品</h2>

                <div class="flex bg-stone-200/50 p-1 rounded-full overflow-x-auto no-scrollbar w-full sm:w-auto"
                    id="filter-buttons">
                    <button data-filter="recommend" onclick="setFeedFilter('recommend')"
                        class="feed-filter-btn filter-active px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors">🌟
                        推荐</button>
                    <button data-filter="high-spend" onclick="setFeedFilter('high-spend')"
                        class="feed-filter-btn bg-white text-textmuted px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors shadow-sm ml-1">🔥
                        高消耗</button>
                    <button data-filter="video" onclick="setFeedFilter('video')"
                        class="feed-filter-btn bg-white text-textmuted px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors shadow-sm ml-1">▶
                        视频素材</button>
                    <button data-filter="image" onclick="setFeedFilter('image')"
                        class="feed-filter-btn bg-white text-textmuted px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors shadow-sm ml-1">🖼️
                        图片素材</button>
                    <button data-filter="article" onclick="setFeedFilter('article')"
                        class="feed-filter-btn bg-white text-textmuted px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors shadow-sm ml-1">📝
                        文章</button>
                </div>
            </div>

            <!-- 数据在后台无感抓取，初始状态为骨架屏 -->
            <div id="feed-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 min-h-[300px]">
                <!-- 骨架屏卡片 1 -->
                <div class="rico-card animate-pulse overflow-hidden">
                    <div class="w-full h-64 bg-stone-100"></div>
                    <div class="p-6 space-y-3">
                        <div class="h-4 bg-stone-100 rounded w-1/4"></div>
                        <div class="h-6 bg-stone-100 rounded w-3/4"></div>
                        <div class="h-4 bg-stone-100 rounded w-full"></div>
                    </div>
                </div>
                <!-- 骨架屏卡片 2 -->
                <div class="rico-card animate-pulse overflow-hidden">
                    <div class="w-full h-64 bg-stone-100"></div>
                    <div class="p-6 space-y-3">
                        <div class="h-4 bg-stone-100 rounded w-1/4"></div>
                        <div class="h-6 bg-stone-100 rounded w-3/4"></div>
                        <div class="h-4 bg-stone-100 rounded w-full"></div>
                    </div>
                </div>
                <!-- 骨架屏卡片 3 -->
                <div class="rico-card animate-pulse overflow-hidden">
                    <div class="w-full h-64 bg-stone-100"></div>
                    <div class="p-6 space-y-3">
                        <div class="h-4 bg-stone-100 rounded w-1/4"></div>
                        <div class="h-6 bg-stone-100 rounded w-3/4"></div>
                        <div class="h-4 bg-stone-100 rounded w-full"></div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script>
        let currentFilter = 'recommend';

        function syncProfile() {
            const nameEl = document.getElementById('profile-name');
            const titleEl = document.getElementById('profile-title');
            const sloganEl = document.getElementById('profile-slogan');
            const avatarEl = document.getElementById('profile-avatar');
            const tagsEl = document.getElementById('profile-tags');

            if (db.profile.name) {
                if (avatarEl) avatarEl.innerText = db.profile.name.charAt(0);
                if (nameEl) nameEl.innerText = db.profile.name;
                if (titleEl) titleEl.innerText = db.profile.title;
                if (sloganEl) sloganEl.innerText = db.profile.slogan;
                if (tagsEl && db.profile.tags) {
                    tagsEl.innerHTML = db.profile.tags.map(tag => `<span class="px-4 py-1.5 rounded-full bg-stone-100 text-stone-700 text-sm font-medium border border-stone-200"># ${tag}</span>`).join('');
                }
            }
        }

        // 将逻辑封装进 initPage，供 SPA 路由调用
        window.initPage = async function() {
            // 1. 尝试从缓存渲染个人信息
            const cachedProfile = localStorage.getItem('resume_full_cache');
            if (cachedProfile) {
                try {
                    db.profile = JSON.parse(cachedProfile);
                    syncProfile();
                } catch(e) {}
            }
            syncProfile();
            
            // 2. 【核心优化】双轨制加载：先拿缓存渲染内容，不再等那 5 秒
            const cachedWorks = api.cache.get('works');
            const cachedArticles = api.cache.get('articles');
            if (cachedWorks || cachedArticles) {
                // 如果有缓存，先渲染一波
                let items = [];
                const works = cachedWorks || [];
                const articles = cachedArticles || [];
                if (currentFilter === 'recommend') items = works.sort((a,b)=>b.spend-a.spend).slice(0,3).concat(articles);
                else if (currentFilter === 'article') items = articles;
                else items = works.filter(w => w.type === currentFilter || currentFilter === 'all' || currentFilter === 'recommend');
                
                renderToFeed(items);
            }
            
            // 3. 后台执行真实的 API 同步（会在 5 秒后完成并由 DOM 守卫判定是否更新）
            loadFeed();
        };

        // 抽取渲染逻辑为通用函数
        function renderToFeed(items) {
            const feedContainer = document.getElementById('feed-container');
            if (!feedContainer || !items.length) return;

            let itemsHTML = '';
            items.forEach(item => {
                if (item.spend !== undefined) itemsHTML += generateWorkCard(item);
                else itemsHTML += generateArticleCard(item);
            });

            if (feedContainer.innerHTML.trim() !== itemsHTML.trim()) {
                feedContainer.innerHTML = itemsHTML;
            }
        }

        async function loadFeed() {
            const feedContainer = document.getElementById('feed-container');
            if (!feedContainer) return;

            const items = await api.fetchFeedItems(currentFilter);
            if (items.length > 0) {
                renderToFeed(items);
            } else if (!feedContainer.innerHTML.trim()) {
                feedContainer.innerHTML = `<div class="col-span-full text-center py-10 text-textmuted">没有找到相关数据，请去 Strapi 后台发布几条。</div>`;
            }
        }

        window.setFeedFilter = function (filter) {
            currentFilter = filter;
            document.querySelectorAll('.feed-filter-btn').forEach(btn => {
                btn.classList.remove('filter-active', 'bg-white', 'text-textmain');
                if (btn.dataset.filter === filter) btn.classList.add('filter-active');
                else btn.classList.add('bg-white', 'text-textmuted');
            });
            loadFeed();
        }
    </script>
</body>

</html>
